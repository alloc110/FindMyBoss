name: Job Scraper

# 1. Cấu hình thời gian chạy tự động (ví dụ: 8h sáng mỗi ngày) hoặc chạy tay
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:      # Cho phép bấm nút "Run workflow" trên giao diện GitHub

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      # 2. Lấy code từ repo về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Cài đặt Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Hoặc phiên bản bạn đang dùng

      # 4. Cài đặt các thư viện hệ thống cần thiết cho trình duyệt và màn hình ảo
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0

      # 5. Cài đặt thư viện Python và Playwright
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Cài đặt trình duyệt chromium và các thư viện đi kèm của nó
          pip install playwright playwright-stealth
          playwright install chromium --with-deps

      # 6. Chạy Scraper với Xvfb (Màn hình ảo)
      - name: Run Scraper
        env:
          # Lấy Webhook URL từ mục Settings > Secrets của GitHub
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTIONS: "true"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python main.py
