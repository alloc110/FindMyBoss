name: Job Crawler Bot

on:
  schedule:
    # Chạy tự động mỗi 12 tiếng (Giờ UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút "Run" thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài đặt từ file requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers
        # Bước này cài đặt trình duyệt và các thư viện hệ thống cần thiết cho Ubuntu
        run: playwright install --with-deps chromium

      - name: Run Scraper
        env:
          # Đưa Webhook vào môi trường chạy của GitHub
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py